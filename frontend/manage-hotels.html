<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gérer les hôtels - eHotels</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>eHotels</h1>
      <p class="subtitle">Gérer les établissements hôteliers</p>
      <nav class="nav">
        <a href="index.html">Accueil</a>
        <a href="search.html">Rechercher</a>
        <a href="reserve.html">Réserver</a>
        <a href="rent.html">Louer</a>
        <a href="convert.html">Convertir</a>
        <a href="manage-clients.html">Clients</a>
        <a href="manage-employees.html">Employés</a>
        <a href="manage-hotels.html">Hôtels</a>
        <a href="manage-rooms.html">Chambres</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-header">
      <h2>Gérer les hôtels</h2>
      <p>Administrez les hôtels, leur chaîne et leur gestionnaire.</p>
    </section>

    <section class="form-section">
      <form class="management-form" id="hotelManagementForm">
        <div class="form-status" id="hotelStatus" aria-live="polite"></div>

        <div class="form-grid">
          <div class="form-group">
            <label for="hotel_name">Nom de l'hôtel</label>
            <input type="text" id="hotel_name" name="hotel_name" placeholder="Entrez le nom de l'hôtel" required />
            <p class="field-error" id="hotel_name_error"></p>
          </div>

          <div class="form-group">
            <label for="hotel_chain_id">Chaîne</label>
            <select id="hotel_chain_id" name="hotel_chain_id" required>
              <option value="">Sélectionnez une chaîne</option>
            </select>
            <p class="field-error" id="hotel_chain_id_error"></p>
          </div>

          <div class="form-group">
            <label for="hotel_category">Catégorie</label>
            <select id="hotel_category" name="hotel_category" required>
              <option value="">Sélectionnez une catégorie</option>
              <option value="1">1 étoile</option>
              <option value="2">2 étoiles</option>
              <option value="3">3 étoiles</option>
              <option value="4">4 étoiles</option>
              <option value="5">5 étoiles</option>
            </select>
            <p class="field-error" id="hotel_category_error"></p>
          </div>

          <div class="form-group">
            <label for="hotel_address">Adresse</label>
            <input type="text" id="hotel_address" name="hotel_address" placeholder="Entrez l'adresse" required />
            <p class="field-error" id="hotel_address_error"></p>
          </div>

          <div class="form-group">
            <label for="hotel_email">Email</label>
            <input type="email" id="hotel_email" name="hotel_email" placeholder="Entrez l'email" />
            <p class="field-error" id="hotel_email_error"></p>
          </div>

          <div class="form-group">
            <label for="hotel_phone">Téléphone</label>
            <input type="text" id="hotel_phone" name="hotel_phone" placeholder="Entrez le téléphone" />
            <p class="field-error" id="hotel_phone_error"></p>
          </div>

          <div class="form-group">
            <label for="hotel_manager_id">Gestionnaire</label>
            <select id="hotel_manager_id" name="hotel_manager_id">
              <option value="">Sélectionnez un gestionnaire</option>
            </select>
            <p class="field-error" id="hotel_manager_id_error"></p>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Enregistrer l'hôtel</button>
          <button type="reset" class="btn btn-secondary">Effacer</button>
        </div>
      </form>
    </section>

    <section class="results-section">
      <div class="results-header">
        <h3>Hôtels actuels</h3>
        <p>Liste des hôtels synchronisée avec PostgreSQL.</p>
      </div>

      <div class="management-grid" id="hotelResults"></div>
    </section>
  </main>

  <script src="assets/script.js"></script>
</body>
</html>
